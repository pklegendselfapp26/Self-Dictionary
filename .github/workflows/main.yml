name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev \
            libtinfo6 cmake libffi-dev libssl-dev libsqlite3-dev sqlite3 bzip2 \
            libbz2-dev libgdbm-dev libgdbm-compat-dev liblzma-dev libreadline-dev \
            uuid-dev libltdl-dev lld gettext

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools virtualenv

      - name: Build with Buildozer
        # Removed the 'clean' command causing the crash. Going straight to debug!
        run: yes | buildozer android debug
        env:
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dictionary-App-APK
          path: bin/*.apk
