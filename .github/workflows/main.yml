name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # This adds a manual "Run workflow" button in GitHub!

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential libsqlite3-dev sqlite3 bzip2 libbz2-dev \
            zlib1g-dev libssl-dev openssl libgdbm-dev libgdbm-compat-dev \
            liblzma-dev libreadline-dev libncursesw5-dev libffi-dev \
            uuid-dev libffi8 openjdk-17-jdk autoconf libtool pkg-config \
            zip unzip

      - name: Install Python Tools
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython==0.29.33 setuptools virtualenv

      - name: Build with Buildozer
        run: buildozer android debug
        env:
          # This specifically stops the GitHub Action from hanging forever waiting for you to type "Yes"
          ACCEPT_SDK_LICENSE: "y"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Dictionary-App-APK
          path: bin/*.apk

